version: 1

# ----------------------------------------------------------------------------
# Model architectures — HuggingFace arch → (attention family, FFN family)
# ----------------------------------------------------------------------------
# This file is a *report-time annotation layer*, NOT an analysis input.
# The analyser does NOT use it to drive segmentation or detection — those
# go through kernel/family signatures only (see attention_families.yaml
# and moe_families.yaml).
#
# IMPORTANT — what this skill CAN and CANNOT see:
#
#   The skill's input is a torch_npu profiling directory (``ascend_pt/``
#   — kernel_details.csv, step_trace_time.csv, op_summary, trace_view.json,
#   communication.json, etc.). **It does not have access to the
#   HuggingFace ``config.json`` of the served model.** Top-level
#   architectural fields like ``hidden_size``, ``num_hidden_layers``,
#   ``num_experts``, ``kv_lora_rank``, ``qk_rope_head_dim`` etc. are
#   never directly available.
#
#   However, ``kernel_details.csv`` does record per-event tensor shapes
#   in the ``Input Shapes`` cell (when not wiped by aclgraph compile).
#   That lets the skill extract a few derived signals on a best-effort
#   basis — most importantly the Q / K head counts on FIA /
#   UnpadFlashAttention events, which feed the shape-refinement step
#   that upgrades ``gqa_or_mha`` to ``mha`` / ``gqa`` / ``mqa`` (see
#   ``common.refine_dense_attention_from_shapes`` and
#   ``attention_families.yaml:gqa_or_mha.sub_kinds``).
#
#   That means:
#     * The skill CANNOT pin a profile to a specific HF arch by
#       reading its config. The strongest signal it has is the
#       *kernel signature set* observed in the profile (see
#       attention_families.yaml) plus best-effort Input Shapes.
#     * The skill CAN, when shapes are present and pass sanity checks,
#       narrow ``gqa_or_mha`` to ``mha`` / ``gqa`` / ``mqa``. The
#       refinement is a heuristic, not a contract — when shapes are
#       missing the umbrella label stays.
#
# Use cases for this file:
#   - **Human-readable lookup table.** A user reading the YAML sees what
#     attention / FFN family a given HF arch maps to. Useful as
#     reference, not as runtime input.
#   - **Skill-author documentation.** ``hf_config_signals`` and ``notes``
#     describe what *would* identify each arch *if* the consumer (e.g.
#     a serving-side caller) reads the HF config separately. The
#     analyser ignores those fields.
#   - **Future external-tool integration.** If a different tool (not
#     this skill) joins the profile to HF config, it can consume this
#     table to provide a finer label. Out of scope here.
#
# References:
#   - vllm/vllm/model_executor/models/registry.py (_VLLM_MODELS)
#   - knowledge/attention_families.yaml
#   - knowledge/moe_families.yaml

schema_notes:
  family_resolution: |
    Each entry binds an HF architecture name to one attention family AND
    one FFN family. When a checkpoint can use multiple paths (e.g.
    GlmMoeDsa is MLA without index_topk and DSA with it), list both
    candidate families in ``attention_candidates``.

    ``attention`` values use the SAME vocabulary as the
    ``attention_family`` enum in ``semantic_conventions.yaml``:
      * paper-aligned:    mla / dsa / csa / hca
      * dense umbrella:   gqa_or_mha    (FIA / UnpadFlashAttention path;
                                         used when this table doesn't
                                         commit to one of the shape-
                                         refined sub-kinds below)
      * shape-refined:    mha / gqa / mqa
                                        (the report can land on these
                                         per-block when FIA Input Shapes
                                         pass sanity checks; this static
                                         table mostly uses ``gqa_or_mha``
                                         because the same HF arch can
                                         ship checkpoints with either
                                         GQA or MHA configs)
      * other:            linear / hybrid / unknown

    A few entries below use the composite labels ``csa_hca_hybrid`` and
    ``hybrid`` for models that alternate layer types within a single
    forward pass (DSV4 alternates CSA/HCA; some Qwen3-Next layers
    alternate dense + linear). The per-block label still uses one of
    the enum values above.
  hf_config_signals: |
    **Documentation only — the analyser does NOT read HF config.**
    Lists the minimal set of HF config fields that would, if available
    to some external joiner tool, distinguish each architecture. The
    profiling skill itself only sees ``ascend_pt/`` outputs.

    Note that a *subset* of these signals — specifically Q/K head
    counts — can be reconstructed best-effort from
    ``kernel_details.csv:Input Shapes`` for FIA / UnpadFA events. That
    feeds the ``gqa_or_mha`` → ``mha`` / ``gqa`` / ``mqa`` refinement
    (see ``attention_families.yaml:gqa_or_mha.sub_kinds``). The other
    signals listed here (``kv_lora_rank``, ``num_experts``, etc.) are
    NOT reachable from the profile.
  block_pattern: |
    Coarse layer composition expected in a normal forward. The analyser
    cross-checks the observed block_kind sequence against this to flag
    surprises (e.g. expected ``[attention, moe]`` but observed
    ``[attention, ffn]``).

# ----------------------------------------------------------------------------
# Families (the LHS of the mapping)
# ----------------------------------------------------------------------------
architectures:

  # ============================== DeepSeek =================================

  DeepseekV2ForCausalLM:
    attention: mla
    ffn: mc2                 # MoE
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, num_experts]
    block_pattern: [attention, moe]
    notes: |
      Classic MLA + MoE. No sparse-attention kernels expected. If the
      trace shows ``attention.lightning_indexer`` or
      ``attention.sparse_sharedkv`` for a V2 / V3 checkpoint, the
      analyser has misclassified the kernel set.

  DeepseekV3ForCausalLM:
    attention: mla
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, num_experts]
    block_pattern: [attention, moe]

  DeepseekV32ForCausalLM:
    attention: dsa                # paper: DeepSeek Sparse Attention (arxiv 2512.02556)
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, index_topk, index_n_heads, index_head_dim]
    block_pattern: [attention, moe]
    notes: |
      V3.2 introduces DSA. DSA = Lightning Indexer + fine-grained
      top-k token selection built on top of MLA (MQA mode). Profile
      signature: ``attention.lightning_indexer`` + ``attention.sparse_sharedkv``
      with NO ``attention.kv_compressor``. CANN backend is the same
      AscendSFAImpl as V4, but the architecture per paper is DSA.

  DeepseekV4ForCausalLM:
    attention: csa_hca_hybrid     # paper: CSA + HCA alternating
    ffn: mc2
    hf_config_signals: [kv_lora_rank, qk_rope_head_dim, index_topk]
    block_pattern: [attention, moe]
    notes: |
      V4 alternates two attention kinds layer-by-layer:
        * CSA (Compressed Sparse Attention): 4x KV compression +
          Lightning Indexer + sparse attention with sliding window.
          Profile signature: ``attention.kv_compressor`` AND
          ``attention.lightning_indexer`` AND
          ``attention.sparse_sharedkv``.
        * HCA (Heavily Compressed Attention): 128x KV compression +
          dense FIA attention. Profile signature:
          ``attention.kv_compressor`` AND ``attention.flash_score``,
          without indexer/sparse-sharedkv. **Detection is heuristic.**
      Both share the AscendSFAImpl backend.

  DeepseekForCausalLM:
    attention: mla
    ffn: dense_swiglu
    notes: V1 dense; rare in modern deployments.

  LongcatFlashForCausalLM:
    attention: mla
    ffn: mc2

  GlmMoeDsaForCausalLM:
    # The class name advertises "DSA" but the upstream implementation
    # was reused from the GLM MoE MLA path. Treat both as legitimate
    # candidates until we have a real profile to confirm; the analyser
    # disambiguates per-block via kernel_signatures.yaml.
    attention_candidates: [mla, dsa]
    ffn: mc2
    hf_config_signals: [index_topk]
    notes: |
      "DSA" in the HF arch name is a marketing label (DeepSeek Sparse
      Attention) and is unrelated to the op_type ``dsa`` (Data Stream
      Accelerator). Implementation inherits DeepseekV2ForCausalLM and
      becomes SFA when ``index_topk`` is set in the config.

  MiniCPM3ForCausalLM:
    attention: mla
    ffn: dense_swiglu

  # ============================== Llama / Mistral / Qwen ===================

  LlamaForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu
    hf_config_signals: [num_attention_heads, num_key_value_heads, hidden_size]
    block_pattern: [attention, ffn]
    notes: |
      Llama-1 was MHA; from Llama-2 onwards mostly GQA. Disambiguation
      requires shape inspection (deferred).

  MistralForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  Qwen2ForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  Qwen3ForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu
    notes: QK norm in attention; same broad kernel mix as Qwen2.

  Qwen2MoeForCausalLM:
    attention: gqa_or_mha
    ffn: mc2
    block_pattern: [attention, moe]

  Qwen3MoeForCausalLM:
    attention: gqa_or_mha
    ffn: mc2
    block_pattern: [attention, moe]

  Qwen3NextForCausalLM:
    attention: hybrid                 # full_attention OR linear_attention per layer
    ffn: hybrid                       # dense OR moe per layer
    hf_config_signals: [layer_types, decoder_sparse_step, num_experts]
    block_pattern: [attention | linear, ffn | moe]
    notes: |
      Per-layer mix; the analyser must NOT assume a single family for
      the whole step.

  MixtralForCausalLM:
    attention: gqa_or_mha
    ffn: mc2

  PhimoeForCausalLM:
    attention: gqa_or_mha
    ffn: mc2

  Phi3ForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  # ============================== Gemma / GPT / Bloom ======================

  Gemma2ForCausalLM:
    attention: gqa_or_mha                  # GQA, half the layers use sliding window
    ffn: dense_swiglu
    notes: per-layer sliding window via layer_types; treated as dense.

  Gemma3ForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  GPT2LMHeadModel:
    attention: gqa_or_mha                  # MHA
    ffn: dense_gelu

  BloomForCausalLM:
    attention: gqa_or_mha                  # MHA with ALiBi
    ffn: dense_gelu

  GptOssForCausalLM:
    attention: gqa_or_mha                  # GQA + attention sinks + sliding
    ffn: mc2

  # ============================== Linear / Mamba / Hybrid ==================

  Mamba2ForCausalLM:
    attention: linear       # SSM, IsAttentionFree
    ffn: dense_swiglu                 # nominal; not transformer FFN
    block_pattern: [attention]

  MambaForCausalLM:
    attention: linear
    ffn: dense_swiglu

  FalconMambaForCausalLM:
    attention: linear
    ffn: dense_swiglu

  MiniMaxText01ForCausalLM:
    attention: linear
    ffn: mc2

  JambaForCausalLM:
    attention: hybrid                 # attention + mamba per layer
    ffn: hybrid

  KimiLinearForCausalLM:
    attention: hybrid                 # MLA + KimiDeltaAttention
    ffn: mc2

  BailingMoeV2_5ForCausalLM:
    attention: hybrid                 # MLA + linear per layer
    ffn: mc2

  # ============================== Other MoE ================================

  DbrxForCausalLM:
    attention: gqa_or_mha
    ffn: mc2

  OlmoeForCausalLM:
    attention: gqa_or_mha
    ffn: mc2

  Ernie4_5_MoeForCausalLM:
    attention: gqa_or_mha
    ffn: mc2

  SarvamMLAForCausalLM:
    attention: mla
    ffn: dense_swiglu

  SarvamMoEForCausalLM:
    attention: mla
    ffn: mc2

  AXK1ForCausalLM:
    attention: mla
    ffn: mc2

  # ============================== Dense legacy =============================

  ChatGLMModel:
    attention: gqa_or_mha
    ffn: dense_swiglu

  BaiChuanForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  InternLMForCausalLM:
    attention: gqa_or_mha
    ffn: dense_swiglu

  # ============================== Fallback =================================

  TransformersForCausalLM:
    attention: unknown
    ffn: unknown
    notes: |
      Delegates to HuggingFace model definition. The analyser must
      infer from trace kernels only; do not consult this table.

# ----------------------------------------------------------------------------
# Diagnosis hooks (what the analyser is allowed to do with this table)
# ----------------------------------------------------------------------------
diagnosis_uses:
  - |
    When manifest.json carries ``model_id`` resolvable to one of the
    architectures above, compare the observed attention family against
    the expected one. Mismatch → diagnostic finding
    ``attention_family_mismatch``.
  - |
    When the observed block_pattern differs from the documented one,
    emit a low-severity ``block_pattern_unexpected`` finding (e.g.
    expected attention+moe but saw attention+ffn → check if a
    speculative-decoding or companion layer slipped in).

non_goals:
  - |
    Do NOT use ``num_hidden_layers`` from this table to drive segment
    cutting. The segmenter uses pure structural signatures (see
    block_taxonomy.md).
  - |
    Do NOT guess the model from layer count or kernel mix alone — that
    is what the report's structure fingerprint is for, and that lives
    in html_report.guess_model_structure (UI-only).
