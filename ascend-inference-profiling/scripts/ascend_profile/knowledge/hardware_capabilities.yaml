# Ascend NPU hardware reference.
#
# Sources (in order of authority):
#   1. support.huawei.com/enterprise/zh/doc/EDOC1100317202  — Atlas 800T A2 official spec (910B2)
#   2. e.huawei.com/cn/products/computing/ascend/atlas-900-a3-superpod — Atlas 900 A3 SuperPoD official spec (910C)
#   3. awesome-ascend-skills/skills/profiling/training-mfu-calculator — MindStudio-Agent内置MFU计算器 (华为官方工具链)
#   4. blog.ailemon.net/2025/05/24/huawei-ascend-npu-params-for-ai/ — 第三方汇总, 交叉验证用
#
# 所有算力值均标注来源。官方来源优先, 第三方来源仅作参考。
# peak_fp16_tflops 为主参考值 (标量), 保持向后兼容。
# peak_fp16_tflops_binning 为官方文档中的分bin范围。
#
# 片上内存 (HBM) 带宽交叉验证:
#   910B2: 1600 GB/s (单die, 官方文档 EDOC1100317202)
#   910C:  3200 GB/s (双die, 官方 Atlas 900 A3 产品页)
#   → 3200 = 2 × 1600, 双die聚合与单die带宽一致 ✓
#   → NVIDIA A100 (80GB HBM2e): 2.0 TB/s = 25 GB/s per GB
#     910B2 (64GB HBM2e): 1600 GB/s = 25 GB/s per GB — 同代HBM2e密度相当 ✓
#
# 第三方来源广泛引用的 392 GB/s (910B2) 与官方文档 1600 GB/s 矛盾,
# 可能为早期非官方估算值或单一HBM stack带宽。以官方文档为准。
#
# 架构标签 (A1/A2/A3) 对应 Atlas 平台代际:
#   A1 = 第一代 DaVinci (910A, 2019)
#   A2 = 第二代 DaVinci, Cube/Vector 解耦 (910B1/B2/B3/B4, 2021-2022)
#   A3 = 第三代, 双die Chiplet 封装 (910C, 2025 Q1)

version: 2

architecture_notes:
  A1: |
    第一代 DaVinci 架构 (2019)。AI Core 内 Cube/Vector 共享调度,
    无明显解耦特征。profiling 中 AIC_* / AIV_* 流水线阶段概念在
    此代不适用。910A 已停产, 现网存量极少。
  A2: |
    第二代 DaVinci 架构 (2021-2022)。Cube/Vector 解耦架构。
    AI Core 内的 Cube 单元和 Vector 单元共用 L1 buffer,
    通过独立的 MTE/DMA 通道访问。profiling 中的 AIC_* 和
    AIV_* 流水线阶段反映两个单元的独立时间。Cube 和 Vector
    不完全并行 —— aicore_time 和 aiv_time 的总和 ≤ wall time。
    HBM 带宽 1600 GB/s (官方文档 EDOC1100317202)。
  A3: |
    第三代 DaVinci 架构 (2025 Q1)。双 die Chiplet 封装 (SMIC N+2),
    单卡等效两颗 A2 die。每 die 独立具备 Cube/Vector 解耦,
    HBM 总量 128 GB (2×64 GB), 聚合带宽 3.2 TB/s。
    D2D 互联 784 GB/s 双向 (官方 Atlas 900 A3 产品页)。
    profiling 中 aicore_time / aiv_time 总和可以大于 wall time
    (两个 die 上的 Cube 和 Vector 可以真正并行)。

