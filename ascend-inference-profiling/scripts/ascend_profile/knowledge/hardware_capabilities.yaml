    hccs_interconnect_gb_s: 784
    hccs_interconnect_source: "华为官网 Atlas 900 A3 SuperPoD 产品页: 'D2D双向带宽784GB/s'"
    tdp_watts: null
    tdp_source: "无可靠官方来源; 第三方估计 ~550W, 不宜写入此文件"
    status: "current"
    note: |
      双 die Chiplet (2× A2 die 等效), SMIC N+2 工艺。
      HBM 带宽 3.2 TB/s = 2 × 1600 GB/s, 与 A2 单die 带宽交叉验证一致。
      D2D 互联 784 GB/s 双向 (die-to-die via HCCS)。
      D2D 带宽与 HBM 带宽的比率 (784 / 3200 ≈ 0.25) 反映了 die 间通信
      相对片上内存访问的带宽不对称 —— 这对 EP/TP 通信模式有直接影响。

