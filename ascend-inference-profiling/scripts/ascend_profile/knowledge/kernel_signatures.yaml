version: 1

# ----------------------------------------------------------------------------
# Kernel signature inventory
# ----------------------------------------------------------------------------
# Map from "kernel name in kernel_details.csv (Name column, after
# common.fold_text)" to the *category labels* this skill emits in
# op_categories. Categories are deliberately **neutral**: the same kernel
# can serve more than one architecture (e.g. the Compressor kernel runs in
# both V4 CSA and V4 HCA layers), and the architecture family is decided
# downstream from the *combination* of category signatures, not from any
# single kernel name.
#
# Naming policy:
#   * Architecture/paper names (mla / dsa / csa / hca / gqa_or_mha) are only used
#     at the family-resolution layer (see attention_families.yaml and
#     html_report.detect_attention_subtype).
#   * Kernel categories below are descriptive: ``attention.kv_compressor``,
#     ``attention.lightning_indexer``, ``attention.sparse_sharedkv`` — they
#     describe what the kernel does on Ascend, not which paper it came from.
#   * CANN / vllm-ascend backend names (``AscendSFAImpl``, ``AscendMLAImpl``)
#     are documented as evidence but never used as op_categories values.
#
# Each entry carries an ``evidence`` field with ``path:line``; if evidence
# lives outside this repo (closed-source CANN op, paper), we say so.

schema_notes:
  folding: |
    Profile names are folded via common.fold_text before matching: lowercase,
    drop "aclnn"/"aclop"/"kernel"/"infer" prefixes/suffixes and trailing
    "_<digits>". So "aclnnLightningIndexerQuant" reduces to
    "lightningindexerquant".
  conflict_resolution: |
    When more than one rule matches a name, all matching categories are
    added — the kernel may legitimately span multiple roles (e.g. fused
    MoE compute + collective communication). Family resolution operates on
    the *set* of categories present in a block, not on a single kernel.

# ----------------------------------------------------------------------------
# Attention kernels
# ----------------------------------------------------------------------------
kernels:

  # ---- Flash-style score kernels: FIA / UnpadFlashAttention.
  #      These are general-purpose dense flash-attention score kernels.
  #      Per the CANN docs
  #      (aclnnFusedInferAttentionScore[V2-V5], torch_npu.npu_fused_infer_attention_score),
  #      the same op supports **MHA, GQA, AND MLA** depending on the
  #      ``num_key_value_heads`` parameter:
  #        * num_kv == num_q              → MHA
  #        * 1 < num_kv < num_q           → GQA
  #        * num_kv == 1 (or per latent)  → MLA / MQA-style
  #      The kernel category therefore stays neutral
  #      (``attention.flash_score``); the architecture family is
  #      decided downstream from the *combination* of category
  #      signatures present in a block (see attention_families.yaml).
  - profile_name: fusedinferattentionscore
    aliases: [fusedinferattentionscorev2, fusedinferattentionscorev3, fusedinferattentionscorev4, fia, fiav2]
    python_entry: torch_npu.npu_fused_infer_attention_score[_v2/_v3/_v4]
    categories: [attention.flash_score]
    roles: [attention]
    used_by_family: [mla, dsa, hca, gqa_or_mha]
    evidence:
      - "CANN docs aclnnFusedInferAttentionScoreV4 — explicit MHA / GQA / MLA support
        via num_key_value_heads"
      - "vllm-ascend/vllm_ascend/attention/attention_v1.py — dense path"
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:1524 — MLA decode score"

  - profile_name: unpadflashattention
    aliases: [flashattention, flashattentionscore, unpadflashattentionbf16ndkernel]
    python_entry: torch_npu.npu_flash_attention*
    categories: [attention.flash_score]
    roles: [attention]
    used_by_family: [mla, gqa_or_mha]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/attention_v1.py — long-context / prefill;
        same dense AscendAttentionBackend, NOT a separate FA backend"
      - "ATB stack: UnpadFlashAttentionBF16NdKernel = ATB-compiled
        bf16 variant of the same dense flash-score op (observed in
        GLM4.5-0919 / Qwen2.5-VL traces)"
    notes: |
      Earlier drafts labelled this kernel as GQA-only. That was wrong:
      ``UnpadFlashAttention`` is the long-context branch of the dense
      ``AscendAttentionBackend`` and, like FIA, supports MHA / GQA via
      the standard ``num_key_value_heads`` configuration.

  # ATB (Ascend Transformer Boost) paged-attention score kernel. The
  # mask-pattern suffix (``MaskNd``) just records the mask layout; the
  # kernel itself is the ATB equivalent of FIA — dense flash-style
  # score op feeding a paged KV cache. CANN docs alias:
  # ``atb_paged_attention_mask`` (closed-source op).
  - profile_name: pagedattentionmask
    aliases: [pagedattentionmaskndkernel]
    python_entry: |
      ATB compiled op (closed-source). Equivalent to FIA in the dense
      AscendAttentionBackend path — selected when ATB acceleration is on
      and the runtime carries a precomputed attention mask.
    categories: [attention.flash_score]
    roles: [attention]
    used_by_family: [gqa_or_mha]
    evidence:
      - "ATB op_list (Ascend Transformer Boost) paged_attention_mask"
      - "Observed in Qwen2.5-VL and GLM4.5-0919 vllm-ascend traces (PR #50 follow-up)"
    notes: |
      ATB-compiled paged-FA score op. Treated as the same kernel
      category as FIA / UnpadFlashAttention so the family resolver
      reaches ``gqa_or_mha`` (or its shape-refined sub-kinds) instead
      of falling back to ``attn``. The shape signal is recorded in
      ``kernel_details.csv:Input Shapes`` the same way FIA records it.

  # ---- MLA (DeepSeek V2 / V3, also reused by DSA in V3.2 paper section 4.x)
  #      CANN canonical op names (per the CANN op_list and the PR that added
  #      the vllm-ascend custom kernel):
  #        - ``mla_prolog`` / ``MlaProlog``           (CANN aclnn op, AI Core)
  #        - ``mla_prolog_v2`` / ``MlaPrologV2WeightNz`` (newer variant)
  #        - ``mla_preprocess`` / ``MlaPreprocess``   (vllm-ascend custom kernel
  #                                                    added in PR #3226)
  #      All three names are accepted by the rule list.
  - profile_name: mlapreprocess
    aliases:
      - mlaprolog
      - mlaprologv2
      - mlaprologweightnz
      - mlapo
    python_entry: |
      torch.ops._C_ascend.mla_preprocess  (vllm-ascend custom)
      torch_npu.npu_mla_prolog / npu_mla_prolog_v2  (CANN)
    categories: [attention.mla, attention.mla.preprocess]
    roles: [attention]
    used_by_family: [mla, dsa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:877 — MLAPO entry"
      - "vllm-ascend/vllm_ascend/device/device_op.py:249"
      - "CANN docs op_list.md — mla_prolog / mla_prolog_v2 inference ops"
      - "vllm-ascend PR #3226 — added the mla_preprocess kernel"
    notes: |
      Fuses qkv_a_proj + layernorm + q_b_proj + RoPE + KV-cache write.
      Triggered on quantised-W8A8 inputs with ≤1024 query tokens. DSA
      (V3.2 paper §4) explicitly builds on MLA, so DSA layers carry the
      same MLA preprocess kernels alongside the sparse signatures.

  - profile_name: transposebatchmatmul
    aliases: [transposequantbatchmatmul]
    python_entry: torch_npu.npu_transpose_batchmatmul
    categories: [attention.mla.v_up_proj, compute.matmul]
    roles: [attention]
    used_by_family: [mla, dsa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:893 — V_up_proj"
    notes: |
      MLA V up-projection BMM with implicit output transpose. Also reused
      by the DSA path in V3.2 because DSA inherits MLA's V folding.

  - profile_name: batchmatmultranspose
    python_entry: torch.ops._C_ascend.batch_matmul_transpose
    categories: [attention.sparse_attn.v_up_proj, compute.matmul]
    roles: [attention]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:841 — V_up_proj ≤1024 tokens"
    notes: |
      Custom Ascend-C kernel inside the SFA backend. Distinct from
      MLA's TransposeBatchMatmul above.

  # ---- Sparse-attention building blocks: shared by DSA (V3.2) and CSA (V4).
  - profile_name: kvquantsparseattnsharedkv
    aliases: [sparseattnsharedkv, sparseattentionsharedkv, sharedkv]
    python_entry: torch.ops._C_ascend.npu_sparse_flash_attention
    categories: [attention.sparse_sharedkv]
    roles: [attention]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:1064"
    notes: |
      Main sparse attention kernel. Used by both DSA (V3.2) and CSA (V4)
      layers — the architecture family is resolved by whether a
      Compressor kernel is also present (CSA) or not (DSA).

  - profile_name: kvquantsparseattnsharedkvmetadata
    aliases: [sparseattnsharedkvmetadata]
    python_entry: (sub-kernel of npu_sparse_flash_attention)
    categories: [attention.sparse_sharedkv.metadata]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence:
      - "appears alongside KVQuantSparseAttnSharedKV in profile traces"

  - profile_name: lightningindexer
    aliases: [quantlightningindexer, indexercompressepilog, indexercompressepilogv2]
    python_entry: |
      torch.ops._C_ascend.npu_lightning_indexer[_quant] |
      torch_npu.npu_lightning_indexer
    categories: [attention.lightning_indexer]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:993 (quant variant)"
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:1023 (default)"
    notes: |
      Top-k token (DSA) or top-k compressed-block (CSA) selector. Present
      in both V3.2 DSA and V4 CSA. Not present in V4 HCA (dense path) or
      V2/V3 MLA.

  - profile_name: quantlightningindexermetadata
    aliases: [lightningindexermetadata]
    python_entry: (sub-kernel of npu_lightning_indexer)
    categories: [attention.lightning_indexer]
    roles: [attention_aux]
    used_by_family: [dsa, csa]
    evidence: missing

  # ---- KV compression (V4-only): present in CSA and HCA layers, NOT in DSA.
  - profile_name: compressor
    python_entry: (sub-kernel of npu_sparse_flash_attention with KV-compression enabled)
    categories: [attention.kv_compressor]
    roles: [attention_aux]
    used_by_family: [csa, hca]
    evidence: missing
    notes: |
      Performs the 4x (CSA) or 128x (HCA per DSV4 paper) block-level KV
      compression. Sub-kernel internal to the SFA fused op; no separate
      Python call site in vllm-ascend. Absence of this kernel inside a
      sparse-attention layer is the discriminator between V3.2 DSA
      (no compressor) and V4 CSA (has compressor).

  - profile_name: kvcompressepilog
    aliases: [kvcompressepilogue]
    python_entry: (sub-kernel)
    categories: [attention.kv_compressor]
    roles: [attention_aux]
    used_by_family: [csa, hca]
    evidence: missing

  # ---- KV-compressed decode augmentation (Hamming-distance KV pruning).
  - profile_name: hammingdisttopk
    aliases: [npuhammingdisttopk]
    python_entry: torch.ops._C_ascend.npu_hamming_dist_top_k
    categories: [attention.kvcomp, attention.kvcomp.topk]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/kvcomp_attn/attention_utils.py:123"

  - profile_name: signbitspack
    aliases: [npusignbitspack]
    python_entry: torch.ops._C_ascend.npu_sign_bits_pack
    categories: [attention.kvcomp.signpack]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/worker/kvcomp_utils.py:452"

  - profile_name: reshapeandcachebnsd
    aliases: [npureshapeandcachebnsd]
    python_entry: torch.ops._C_ascend.npu_reshape_and_cache_bnsd
    categories: [attention.kvcomp.cache_write]
    roles: [attention_aux]
    used_by_family: [overlay]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/kvcomp_attn/attention_utils.py:87"

  # Plain paged-attention KV cache I/O (dense / ATB path; NOT the KVComp
  # Hamming-distance overlay above). The ATB stack ships several
  # variants and the vllm-ascend Triton stack adds reshape_and_cache_*
  # for non-BNSD layouts. They all share the same role: read or write
  # the paged KV cache around the score kernel.
  #
  # Distinction from KVComp:
  #   * ``reshape_and_cache_bnsd``    → KVComp overlay (BNSD layout, decode)
  #   * ``reshape_and_cache`` (other) → plain dense path  (this entry)
  - profile_name: pagedcacheio
    aliases:
      - pagedcacheloadndkernel
      - scatterpakvcache
      - reshapeandcachendkernel
      - reshapeandcache
    python_entry: |
      ATB compiled paged-KV cache ops (closed-source) and the
      vllm-ascend Triton reshape_and_cache_* kernels.
    categories: [attention.kv_cache_io]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa, gqa_or_mha]
    evidence:
      - "transfer/qwen25vl: ReshapeAndCacheNdKernel (8000x in 100k events)"
      - "transfer/glm45 / glm450919: ReshapeAndCacheNdKernel"
      - "transfer/dsv3bad: PagedCacheLoadNdKernel + ScatterPaKvCache (ATB MLA)"
      - "transfer DSV2-Lite: reshape_and_cache_200000000 (Triton)"
    notes: |
      The Python rule MUST run *after* the more specific
      ``reshape_and_cache_bnsd`` rule above so the KVComp variant
      stays under ``attention.kvcomp.cache_write`` and only the
      plain cache ops fall into ``attention.kv_cache_io``.

  # ---- Linear / Mamba / GatedDeltaNet
  - profile_name: causalconv1d
    aliases: [causalconv]
    python_entry: torch.ops.* (various Mamba/GDN backends)
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]
    evidence:
      - "common.py — preserved substring rule"
      - "transfer/prof_311: _causal_conv1d_update_kernel_npu_tiled_0 (1728x)"

  - profile_name: mamba
    aliases: [deltanet, gdn]
    python_entry: various
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]
    evidence:
      - "transfer/prof_311: fused_gdn_gating_kernel_0 (1728x)"

  - profile_name: recurrentgateddeltarule
    aliases: [recurrentdelta, recurrentgateddelta]
    python_entry: |
      Gated DeltaNet recurrent compute kernel (Qwen3-Next family).
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]
    evidence:
      - "transfer/prof_311: RecurrentGatedDeltaRule_* (Qwen3-Next GDN attention)"

  - profile_name: fusedqkvzbasplitreshape
    aliases: [qkvzbasplit, fusedqkvzba]
    python_entry: |
      Qwen3-Next Gated DeltaNet fused QKV + Z (gate) + B (beta)
      + A (alpha) split & reshape kernel. The ``zba`` markers are
      GDN's recurrence parameters, not MLA companions. Previous
      versions mis-tagged this kernel as
      ``attention.mla.kv_norm_rope_cache`` because the bare
      ``fusedqkvzbasplitreshape`` token resembled the MLA
      ``splitqkvrmsnormrope`` kernel — corrected since Fix C.
    categories: [attention.linear_or_mamba]
    roles: [attention]
    used_by_family: [linear]
    evidence:
      - "transfer/prof_311: fused_qkvzba_split_reshape_cat_kernel_0 (1728x co-occurring with causal_conv1d_update and fused_gdn_gating)"

# ----------------------------------------------------------------------------
# Attention companions: RoPE / KV-cache write / normalisation around attention
# ----------------------------------------------------------------------------

  - profile_name: interleaverope
    python_entry: torch_npu.npu_interleave_rope
    categories: [attention.rope, attention.rope.interleave]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:1346"
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:689"

  - profile_name: rotarymul
    aliases: [inplacepartialrotarymul, inplacerotarymul]
    python_entry: torch_npu.npu_rotary_mul
    categories: [attention.rope, attention.rope.partial]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa, gqa_or_mha]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:937"
      - "vllm-ascend/vllm_ascend/attention/sfa_v1.py:977"

  - profile_name: npurotaryembedding
    aliases: [rotaryembedding]
    python_entry: torch_npu._npu_rotary_embedding
    categories: [attention.rope, attention.rope.indexed]
    roles: [attention_aux]
    used_by_family: [gqa_or_mha]
    evidence:
      - "vllm-ascend/vllm_ascend/ops/rotary_embedding.py:189"

  # ATB / Triton generic RoPE kernels. The ATB stack ships several
  # variants with different naming conventions, and vllm-ascend's
  # Triton stack adds more (rotary_pos_emb_*, _triton_rope, etc.).
  # They all serve the same companion role — apply rotary position
  # encoding to Q/K — and the dense / MLA family is decided by the
  # surrounding score / preprocess kernels.
  #
  # The Python rule mirroring this entry is a *positional fallback*
  # that fires only when none of the specific RoPE rules above (
  # InterleaveRope / RotaryMul / NpuRotaryEmbedding / SingleRope)
  # matched. Order matters in common.py.
  - profile_name: rope_generic
    aliases:
      - ropekernel
      - atbropekernel
      - ropewithsincoscache
      - rotaryposembinfer
      - rotarypositionembedding
      - rotaryposemb
      - tritonrope
    python_entry: |
      ATB rope kernels (closed-source) and Triton-emitted rope kernels
      in vllm-ascend. Examples observed in real traces:
        - RopeKernel, AtbRopeKernel (ATB)
        - RopeWithSinCosCache_0_high_performance_20 (Triton)
        - RotaryPosEmbInfer_<hash>_high_performance_22 (Triton)
        - RotaryPositionEmbedding (ATB / generic)
        - rotary_pos_emb_22 (Triton numbered variant)
        - _triton_rope (vllm-ascend MLA Triton path)
    categories: [attention.rope]
    roles: [attention_aux]
    used_by_family: [gqa_or_mha, mla, dsa, csa]
    evidence:
      - "transfer/glm45, transfer/glm450919, transfer/qwen25vl,
        transfer/prof_311, transfer/nextprof traces"
    notes: |
      No architecture-family discriminator on its own — only adds
      ``attention.rope`` so the layer-block decomposer treats it as
      an attention companion. Resolved family is decided by the
      *score / preprocess* kernel in the same block.

  - profile_name: kvrmsnormropecache
    python_entry: torch_npu.npu_kv_rmsnorm_rope_cache
    categories: [attention.mla.kv_norm_rope_cache, attention.rope]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa]
    evidence:
      - "vllm-ascend/vllm_ascend/attention/mla_v1.py:1295"
    notes: |
      Fuses KV RMSNorm + RoPE + paged-attention cache write. MLA-family
      signature; never appears in plain GQA paths. DSA and CSA inherit it
      via the SFA backend reusing MLA's KV pipeline.

  # Triton / Ascend-C custom MLA preprocessing kernels. They take the
  # fused projection output and produce the latent KV + RoPE tensors
  # consumed by the MLA score path, exactly like KvRmsNormRopeCache
  # but compiled as a single split + rmsnorm + rope kernel. Observed
  # in:
  #   * DeepSeek-V2-Lite (split_qkv_rmsnorm_rope_kernel; W8A8 path)
  #   * GLM4.7 (split_qkv_rmsnorm_rope_kernel; "GlmMoeDsaForCausalLM"
  #     marketing label, impl is MLA per attention_families.yaml)
  #
  # NOTE: ``fused_qkvzba_split_reshape_cat_kernel`` was previously
  # listed here as an alias because the bare token resembles the MLA
  # ``splitqkvrmsnormrope`` kernel — but the ``zba`` suffix encodes
  # the GDN gate (Z) / beta (B) / alpha (A) parameters and the kernel
  # is the Qwen3-Next Gated DeltaNet QKV projection split. It is now
  # handled under ``profile_name: fusedqkvzbasplitreshape`` in the
  # linear/mamba block above and tagged as ``attention.linear_or_mamba``.
  - profile_name: splitqkvrmsnormrope
    aliases: [splitqkvrmsnormropekernel]
    python_entry: |
      Triton / Ascend-C custom kernel registered by vllm-ascend in
      mla_v1.py and the GLM/DSV2-Lite Triton stack. Equivalent to
      KvRmsNormRopeCache for the MLA preprocessing stage (split +
      rmsnorm + rope + cache write).
    categories: [attention.mla.kv_norm_rope_cache, attention.rope]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa]
    evidence:
      - "transfer DSV2-Lite trace (W8A8 quant path)"
      - "transfer GLM4.7 trace (paired with FusedInferAttentionScore)"
    notes: |
      Treated as MLA preprocessing — same category as
      KvRmsNormRopeCache — so the family resolver reaches ``mla``
      (or ``dsa`` when sparse companions are also present) instead
      of falling back to ``gqa_or_mha`` or ``attn``.

  # Single-token rotary position embedding kernel emitted on the MLA
  # decode path next to FIA (one RoPE per generated token). Treated as
  # the same companion as InplacePartialRotaryMul.
  - profile_name: singlerope
    python_entry: |
      vllm-ascend MLA decode single-token rope (mla_v1.py rope_single).
      Equivalent role to npu_rotary_mul on the decode path.
    categories: [attention.rope, attention.rope.partial]
    roles: [attention_aux]
    used_by_family: [mla, dsa, csa]
    evidence:
      - "transfer/dsv3 trace (paired with KvRmsNormRopeCache)"
    notes: |
      MLA decode path emits one SingleRope per layer per token. Not to
      be confused with InterleaveRope (prefill) or InplacePartialRotaryMul
      (partial-RoPE on quantised path).

  - profile_name: rmsnorm
    aliases: [addrmsnorm, addrmsnormbias, gemmarmsnorm]
    python_entry: torch.ops._C_ascend.npu_add_rms_norm_bias / npu_gemma_rms_norm
    categories: [normalization]
    roles: [normalization]
    used_by_family: [all]
    evidence:
      - "vllm-ascend/vllm_ascend/ops/layernorm.py:72,101,108"

# ----------------------------------------------------------------------------
# Block-head structural prefix kernels (NOT specific to attention OR MoE)
# ----------------------------------------------------------------------------
# Kernels with the ``hc`` / ``mhc`` prefix (e.g. ``HCPreSinkhorn``,
# ``HCPreInvRMS``, ``HCPost``, ``MhcRmsNorm``) are structural block-head
# normalisation helpers. **They appear before BOTH attention layers and
# MoE routing blocks** in real DSV4 prefill traces. We do not assign them
# a MoE-only or attention-only family; they stay under
# ``block_head.mhc_prefix`` as a structural marker only.

  - profile_name: hcprefix_blockhead
    aliases: [hcpresinkhorn, hcpreinvrms, hcpost, mhcrmsnorm, mhcaddrmsnorm]
    python_entry: |
      various — appear as the leading helper kernel before both
      attention and MoE blocks; some are sub-kernels of fused CANN ops
      (e.g. moe_gating_top_k internals) and some are stand-alone norms.
    categories: [block_head.mhc_prefix]
    roles: [block_head]
    used_by_family: [structural]
    evidence:
      - "DSV4 prefill profile: HCPreSinkhorn / HCPreInvRMS / HCPost appear
        in both attention prologue and MoE routing prologue layers"
    notes: |
      Earlier drafts of this skill tried to push the HC* family under
      ``moe.gating`` (based on the assumption that they were internal to
      ``moe_gating_top_k``). That broke layers where the same prefix
      precedes attention. The block_head label is the safe, paper-neutral
      home — downstream consumers that need to know which block the
      prefix belongs to should look at the immediately following kernel.

# ----------------------------------------------------------------------------
# Quantisation kernels
